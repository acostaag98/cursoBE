<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div class="section">
    <div class="section">
      <h1>Nuevo producto</h1>
      <form action="/api/productos/guardar" enctype="application/x-www-form-urlencoded" method="POST">
        <p>Nombre producto</p>
        <input type="text" name="name" required>
        <p>Precio producto</p>
        <input type="text" name="price" required>
        <p>Link de Foto del producto</p>
        <input type="text" name="thumbnail" required>
        <input type="submit" value="Enviar Producto">
      </form>
      <p class="message"></p>
    </div>
</body>
</html>
